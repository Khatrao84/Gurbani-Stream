<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gurbani Stream</title>
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <link rel="preconnect" href="https://www.youtube.com">
  <link rel="preconnect" href="https://api.rss2json.com">
  <link rel="icon" href="favicon.png" type="image/png">
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gurmukhi:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://www.youtube.com/iframe_api"></script>

  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background-color: black; font-family: "Noto Sans Gurmukhi", sans-serif;
      overflow: hidden; -webkit-tap-highlight-color: transparent; 
      user-select: none; cursor: none;
    }
    body.user-active { cursor: default; }
    #container { position: relative; width: 100vw; height: 100vh; }
    #stream { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    .video-placeholder { width: 100%; height: 100%; background: black; }
    #audio-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-position: center; background-size: cover; z-index: 1; display: none; }
    #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; cursor: pointer; outline: none; }
    #channelName {
      position: absolute; bottom: 0; left: 0; width: 100%;
      padding: 31px 20px 10px 20px; font-size: 24px; font-weight: bold;
      text-align: center; z-index: 3; transform: translateY(0); opacity: 0;
      transition: opacity 0.5s ease;
    }
    .style-main { background: linear-gradient(to top, rgba(0, 41, 107, 0.9) 75%, rgba(0,41,107,0.1) 100%); color: #FFD700 !important; text-shadow: 2px 2px 4px black; }
    .style-alt { background: linear-gradient(to top, rgba(255, 215, 0, 0.9) 75%, rgba(255,215,0,0.1) 100%); color: #00296B !important; text-shadow: none; }
    #channelName.show { opacity: 1; }
    .loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 60px; height: 60px; border: 6px solid rgba(255, 213, 0, 0.2);
      border-radius: 50%; border-top-color: #ffd500;
      animation: spin 1s linear infinite; z-index: 4; display: none;
    }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    #time-tv {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 1; 
      background: url("haarimandr.png") no-repeat center center; background-size: cover;
    }
    #time-tv .clock { position: absolute; top: 6%; right: 3%; font-size: 8.7vw; color: #FFD700; text-shadow: 0 0 10px #FFD700; font-family: sans-serif; }
    #time-tv .date { position: absolute; top: 2%; right: 3.5%; font-size: 3vw; color: #FFE066; font-family: sans-serif; }
  </style>
</head>
<body>
  <div id="container">
    <div id="stream"></div>
    <audio id="bg-audio" preload="auto"></audio>
    <div id="audio-bg"></div>
    <div id="time-tv"><div class="clock"></div><div class="date"></div></div>
    <div id="overlay" tabindex="0"></div>
    <div id="channelName" class="style-main"></div>
    <div class="loading" id="loading"></div>
  </div>

<script>
const Config = {
  SCROLL_SPEED_MS: 350,
  AUTO_REFRESH_MS: 10800000, 
  LOAD_TIMEOUT_MS: 8000,
  RSS_FETCH_TIMEOUT: 5000,
  KEY_THROTTLE_MS: 400,
  LOCAL_AUDIO_FILE: "sukhmani.mp3",
  LOCAL_RADIO_IMG: "audioharimandar.png",
  LONG_PRESS_MS: 800,
  SWIPE_THRESHOLD: 50
};

const CHANNELS = [
  { name: "0. ਸੁਖਮਨੀ ਸਾਹਿਬ", type: "time", allowToggle: true },
  { name: "1. ਸ਼੍ਰੀ ਪਟਨਾ ਸਾਹਿਬ ਲਾਈਵ", channelId: "UC3nqw1kd4AK1q9e68YUoLDQ", altChannelId: "UCwsMainbmOyv-72To2PuxuA", fallback: "TTK7eNuI3M0", type: "direct", allowToggle: true },
  { name: "2. ਸ਼੍ਰੀ ਅੰਮ੍ਰਿਤਸਰ ਸਾਹਿਬ ਲਾਈਵ", channelId: "UCYn6UEtQ771a_OWSiNBoG8w", type: "direct-rss", allowToggle: true, isRadioHybrid: true, radioUrl: "https://live.sgpc.net:8443/;", radioImage: Config.LOCAL_RADIO_IMG },
  { name: "3. ਸ਼੍ਰੀ ਫਤੇਹਗੜ੍ਹ ਸਾਹਿਬ ਲਾਈਵ", channelId: "UCudVHqnOekwcvpzNpY8_ERw", type: "direct-rss", allowToggle: true },
  { name: "4. ਸ਼੍ਰੀ ਕੋਤਵਾਲੀ ਸਾਹਿਬ ਮੋਰਿੰਡਾ ਲਾਈਵ", channelId: "UCri5TwOgoDY3ywUDK9Ar1Lg", type: "direct" },
  { name: "5. ਸ਼੍ਰੀ ਆਨੰਦਪੁਰ ਸਾਹਿਬ ਲਾਈਵ", channelId: "UCSx5035_us8h8DOp_YhQDaw", type: "direct" },
  { name: "6. ਸ਼੍ਰੀ ਦਮਦਮਾ ਸਾਹਿਬ ਲਾਈਵ", channelId: "UCY8jMpyRRcdzSf6uLiU6izQ", type: "direct" },
  { name: "7. ਸ਼੍ਰੀ ਦੂਖ-ਨਿਵਾਰਨ ਸਾਹਿਬ ਲੁਧਿਆਣਾ ਲਾਈਵ", channelId: "UCPKPN4bzM8Ja-F_kIEZoAhA", type: "direct-rss" },
  { name: "8. ਸ਼੍ਰੀ ਦੂਖ-ਨਿਵਾਰਨ ਸਾਹਿਬ ਪਟਿਆਲਾ ਲਾਈਵ", channelId: "UC7Uf4ZOlCGM3zBCLqcNPtJg", type: "direct-rss" },
  { name: "9. ਸ਼੍ਰੀ ਬਾਬਾ ਦੀਪ ਸਿੰਘ ਜੀ ਅੰਮ੍ਰਿਤਸਰ ਲਾਈਵ", channelId: "UCxWx-MPft_7mKrFtN6uOaAA", type: "direct" },
  { name: "10. ਸ਼੍ਰੀ ਪੰਜੋਖਰਾ ਸਾਹਿਬ ਅੰਬਾਲਾ ਲਾਈਵ", channelId: "UCWd5TUzbLUe6_TWKW9vaDmQ", type: "direct" },
  { name: "11. ਸ਼੍ਰੀ ਬੰਗਲਾ ਸਾਹਿਬ ਦਿੱਲੀ ਲਾਈਵ", channelId: "UCA1Jqo-WXVuMgs4WcD5f5Yw", type: "auto-rss" },
  { name: "12. ਸ਼੍ਰੀ ਸੀਸ ਗੰਜ ਸਾਹਿਬ ਦਿੱਲੀ ਲਾਈਵ", channelId: "UCm0p8BmL4d914gBefceFxxA", type: "direct" },
  { name: "13. ਸ਼੍ਰੀ ਸਿੰਘ ਸ਼ਹੀਦਾਂ ਸਾਹਿਬ ਸੋਹਾਣਾ ਲਾਈਵ", channelId: "UCflFRcHHT8Ab7AvjvIVcrQA", type: "direct" },
  { name: "14. ਸ਼੍ਰੀ ਹਜ਼ੂਰ ਸਾਹਿਬ ਲਾਈਵ", channelId: "UCuerQ47I9Y2qxr4eIopxbYw", type: "direct" }
];

const AppState = {
  currentChannel: localStorage.getItem('currentChannel') ? parseInt(localStorage.getItem('currentChannel')) : 0,
  streamToggle: 0,
  activeLoadId: 0, 
  lastScrollTime: Date.now(), 
  timers: { load: null, banner: null, refresh: null },
  suppressClick: false
};

const UI = {
  stream: document.getElementById('stream'),
  timeTv: document.getElementById('time-tv'),
  audioBg: document.getElementById('audio-bg'),
  channelName: document.getElementById('channelName'),
  loading: document.getElementById('loading'),
  overlay: document.getElementById('overlay'),
  bgAudio: document.getElementById('bg-audio'),
  clock: document.querySelector('#time-tv .clock'),
  date: document.querySelector('#time-tv .date')
};

const PlayerService = {
  ytPlayer: null,
  cleanup() {
    if (this.ytPlayer) { try { this.ytPlayer.destroy(); } catch(e) {} }
    this.ytPlayer = null;
    UI.bgAudio.pause(); UI.bgAudio.src = "";
    UI.audioBg.style.display = 'none'; UI.timeTv.style.display = 'none';
    UI.stream.innerHTML = '';
  },
  initYouTube(divId, videoData, channelObj, loadId) {
    if (loadId !== AppState.activeLoadId) return;
    if (!window.YT || !window.YT.Player) { setTimeout(() => this.initYouTube(divId, videoData, channelObj, loadId), 100); return; }
    
    const isChannelLive = videoData.type === 'channel_live';
    this.ytPlayer = new YT.Player(divId, {
      height: '100%', width: '100%',
      videoId: isChannelLive ? null : videoData.id,
      playerVars: { 
        'autoplay': 1, 'mute': 1, 'controls': 0, 'rel': 0, 
        'modestbranding': 1, 'iv_load_policy': 3,
        'origin': window.location.origin,
        'widget_referrer': window.location.href,
        ...(isChannelLive ? { 'listType': 'live_stream', 'list': videoData.id } : {})
      },
      events: { 
        'onReady': (e) => {
            if (loadId !== AppState.activeLoadId) return;
            UI.loading.style.display = 'none';
            e.target.playVideo();
            // Unlock audio for WebOS/Linux
            setTimeout(() => { try { e.target.unMute(); } catch(err) {} }, 1500);
        },
        'onError': (e) => this.onError(e, videoData, channelObj, loadId)
      }
    });
    // Add autoplay permission to the iframe
    setTimeout(() => {
      const ifr = UI.stream.querySelector('iframe');
      if (ifr) ifr.setAttribute('allow', 'autoplay; encrypted-media; fullscreen');
    }, 500);
  },
  onError(event, videoData, channelObj, loadId) {
    if (loadId !== AppState.activeLoadId) return;
    if (channelObj.altChannelId && videoData.id === channelObj.channelId) {
        this.cleanup(); const newDivId = `yt-alt-${Date.now()}`;
        UI.stream.innerHTML = `<div id="${newDivId}"></div>`;
        this.initYouTube(newDivId, {type: 'channel_live', id: channelObj.altChannelId}, channelObj, loadId);
    } else if (channelObj.fallback && videoData.id !== channelObj.fallback) {
        this.cleanup(); const newDivId = `yt-fb-${Date.now()}`;
        UI.stream.innerHTML = `<div id="${newDivId}"></div>`;
        this.initYouTube(newDivId, {type: 'video_id', id: channelObj.fallback}, channelObj, loadId);
    } else { UI.loading.style.display = 'none'; }
  }
};

const DataService = {
  async fetchRSS(channelId, offset = 0) {
    try {
      const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + channelId)}&t=${Date.now()}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.items && data.items.length > offset) return data.items[offset].link.split('v=')[1];
      return null;
    } catch (e) { return null; }
  }
};

const App = {
  init() {
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    this.loadChannel(AppState.currentChannel, 0);
    this.setupInputs();
    setInterval(() => {
        const now = new Date();
        UI.clock.textContent = now.toLocaleTimeString('en-US', { hour12: true });
        UI.date.textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }, 1000);
  },
  setupInputs() {
    UI.overlay.addEventListener('click', () => this.changeChannel(1));
    window.addEventListener('keydown', (e) => {
      const k = e.key;
      if (k === 'Green' || k === 'ColorF1Green') window.location.reload();
      if (k === 'Red' || k === 'ColorF0Red') this.triggerChannelLoad(AppState.currentChannel);
      if (k.includes('ArrowUp') || k.includes('ArrowRight')) this.changeChannel(1);
      if (k.includes('ArrowDown') || k.includes('ArrowLeft')) this.changeChannel(-1);
    });
  },
  changeChannel(dir) {
    const newIdx = (AppState.currentChannel + dir + CHANNELS.length) % CHANNELS.length;
    this.triggerChannelLoad(newIdx);
  },
  triggerChannelLoad(index) {
    if (AppState.currentChannel === index && CHANNELS[index].allowToggle) AppState.streamToggle = 1 - AppState.streamToggle;
    else AppState.streamToggle = 0;
    AppState.currentChannel = index;
    this.showBanner(CHANNELS[index].name, AppState.streamToggle);
    clearTimeout(AppState.timers.load); AppState.activeLoadId++;
    const thisId = AppState.activeLoadId;
    AppState.timers.load = setTimeout(() => { if (thisId === AppState.activeLoadId) this.loadChannel(index, AppState.streamToggle); }, Config.SCROLL_SPEED_MS);
  },
  showBanner(name, mode) {
    UI.channelName.textContent = name; UI.channelName.className = (mode === 1) ? 'style-alt show' : 'style-main show';
    clearTimeout(AppState.timers.banner);
    AppState.timers.banner = setTimeout(() => UI.channelName.classList.remove("show"), 3000);
  },
  loadChannel(index, toggle) {
    const channel = CHANNELS[index]; const genId = AppState.activeLoadId;
    localStorage.setItem('currentChannel', index); UI.loading.style.display = 'block'; PlayerService.cleanup();
    if (channel.type === 'time') {
      UI.timeTv.style.display = 'block'; UI.loading.style.display = 'none';
      UI.bgAudio.src = Config.LOCAL_AUDIO_FILE; UI.bgAudio.play().catch(e => {});
      return;
    }
    const divId = `yt-${Date.now()}`; UI.stream.innerHTML = `<div id="${divId}"></div>`;
    if (channel.type.includes('rss')) {
        DataService.fetchRSS(channel.channelId, toggle).then(vidId => {
            if (genId === AppState.activeLoadId) PlayerService.initYouTube(divId, vidId ? {type:'video_id', id:vidId} : {type:'channel_live', id:channel.channelId}, channel, genId);
        });
    } else {
        PlayerService.initYouTube(divId, (toggle && channel.fallback) ? {type:'video_id', id:channel.fallback} : {type:'channel_live', id:channel.channelId}, channel, genId);
    }
  }
};
App.init();
</script>
</body>
</html>
